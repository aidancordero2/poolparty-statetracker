
# Read the Docs configuration file for PoolParty
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Build documentation in the "docs/" directory with Sphinx
# Path is relative to repository root (use poolparty/docs/conf.py when config is in subdir)
sphinx:
  configuration: poolparty/docs/conf.py

# Optionally build your docs in additional formats such as PDF and ePub
formats:
  - pdf

# Optional but recommended, declare the Python requirements required
# to build your documentation. Path is relative to repository root.
# Install statetracker first (same repo, not on PyPI), then poolparty.
python:
  install:
    - method: pip
      path: statetracker
    - method: pip
      path: poolparty
      extra_requirements:
        - docs
